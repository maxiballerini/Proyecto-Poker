<!doctype html>
<html lang="es" style="background:#111827">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Poker Nights</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme / status bar (oscuro para Android Chrome) -->
    <meta name="theme-color" content="#111827" />
    <meta name="color-scheme" content="dark" />

    <!-- iOS "Add to Home Screen" support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Poker Nights" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        let reloading = false;
        const doReload = () => { if (!reloading) { reloading = true; window.location.reload(); } };

        // New SW sends SW_UPDATED after claiming clients — works even with old page code
        navigator.serviceWorker.addEventListener('message', e => {
          if (e.data && e.data.type === 'SW_UPDATED') doReload();
        });

        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            // Also check for updates every time the user returns to the app
            document.addEventListener('visibilitychange', () => {
              if (document.visibilityState === 'visible') reg.update();
            });
          }).catch(() => {});

          // Fallback: reload when a new SW takes control via controllerchange
          navigator.serviceWorker.addEventListener('controllerchange', doReload);
        });
      }
    </script>
  </body>
</html>
